{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">

    <div class="col-md-4 mb-3">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <h4>Total Users</h4>
                <h2>{{ users }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card bg-success text-white">
            <div class="card-body">
                <h4>Total Foods</h4>
                <h2>{{ foods }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card bg-warning text-dark">
            <div class="card-body">
                <h4>Total Orders</h4>
                <h2>{{ orders }}</h2>
            </div>
        </div>
    </div>

</div>

<div class="row">

    <div class="col-md-4 mb-3">
        <div class="card bg-info text-white">
            <div class="card-body">
                <h4>Total Revenue</h4>
                <h2>₹{{ revenue }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card bg-danger text-white">
            <div class="card-body">
                <h4>Pending Orders</h4>
                <h2>{{ pending }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card bg-secondary text-white">
            <div class="card-body">
                <h4>Delivered Orders</h4>
                <h2>{{ delivered }}</h2>
            </div>
        </div>
    </div>

</div>

{% endblock %}
