{% extends 'base.html' %}

{% block content %}

<div class="row">

<div class="col-md-6">

<img src="{{ food.image.url }}"
class="img-fluid rounded shadow">

</div>

<div class="col-md-6">

<h2>{{ food.name }}</h2>

<h4 class="text-success">
₹ {{ food.price }}
</h4>

<p>{{ food.description }}</p>

<p>

<b>Category:</b>

{{ food.category.name }}

</p>

<a href="{% url 'add_to_cart' food.id %}"
class="btn btn-success btn-lg">

Add to Cart

</a>

</div>

</div>

{% endblock %}
